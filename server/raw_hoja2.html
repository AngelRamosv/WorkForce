<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Agentes MÓVIL - CyberPulse</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Plotly JS -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-purple: #9b59b6;
            --accent-red: #e74c3c;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-orange: #f39c12;
            --accent-cyan: #00d9ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Fondo animado con tonos diferentes para MÓVIL */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 20% 20%, rgba(155, 89, 182, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 60% 40%, rgba(52, 152, 219, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            padding: 1rem;
        }

        /* Header con estilo MÓVIL */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d9ff 0%, #a8e6cf 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-img {
            max-height: 60px;
            filter: drop-shadow(0 0 10px rgba(0, 217, 255, 0.5));
        }

        /* Tarjetas de métricas */
        .metric-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0.5rem 0.8rem;
            transition: all 0.3s ease;
            height: 100%;
        }

        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 217, 255, 0.2);
            border-color: rgba(0, 217, 255, 0.3);
        }

        .metric-card .icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            margin-bottom: 0.4rem;
        }

        .metric-card .icon.purple {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }

        .metric-card .icon.red {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .metric-card .icon.green {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .metric-card .icon.blue {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .metric-card .icon.orange {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }

        .metric-card .icon.cyan {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
        }

        .metric-card .value {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.2rem;
        }

        .metric-card .label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .metric-card .percentage {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            padding: 0.15rem 0.5rem;
            border-radius: 15px;
            display: inline-block;
        }

        .percentage.warning {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .percentage.success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        /* Contenedor de gráfica - PRIORIDAD MÁXIMA */
        .chart-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1rem;
            margin-top: 0.5rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        /* Botones de filtro mejorados */
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-filter {
            padding: 0.5rem 1.2rem;
            border-radius: 25px;
            border: 2px solid transparent;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-filter:hover {
            transform: scale(1.05);
        }

        .btn-filter.purple-btn {
            border-color: var(--accent-purple);
        }

        .btn-filter.purple-btn:hover,
        .btn-filter.purple-btn.active {
            background: var(--accent-purple);
        }

        .btn-filter.red-btn {
            border-color: var(--accent-red);
        }

        .btn-filter.red-btn:hover,
        .btn-filter.red-btn.active {
            background: var(--accent-red);
        }

        .btn-filter.green-btn {
            border-color: var(--accent-green);
        }

        .btn-filter.green-btn:hover,
        .btn-filter.green-btn.active {
            background: var(--accent-green);
        }

        .btn-filter.blue-btn {
            border-color: var(--accent-blue);
        }

        .btn-filter.blue-btn:hover,
        .btn-filter.blue-btn.active {
            background: var(--accent-blue);
        }

        .btn-filter.all-btn {
            border-color: var(--accent-cyan);
        }

        .btn-filter.all-btn:hover,
        .btn-filter.all-btn.active {
            background: var(--accent-cyan);
            color: #0f0c29;
        }

        /* Área de la gráfica - Maximizada */
        #graph {
            width: 100%;
            height: calc(100vh - 260px);
            min-height: 400px;
            border-radius: 10px;
        }

        /* Botón navegación estilo MÓVIL */
        .btn-nav {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 25px;
            color: #0f0c29;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
            color: #0f0c29;
        }

        /* Alertas */
        .alert-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.15rem 0.5rem;
            border-radius: 15px;
            font-size: 0.6rem;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        .alert-badge.danger {
            background: rgba(231, 76, 60, 0.3);
            color: #ff6b6b;
            border: 1px solid rgba(231, 76, 60, 0.5);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* Badge "MÓVIL" distintivo */
        .mobile-badge {
            background: linear-gradient(135deg, #00d9ff, #0099cc);
            color: #0f0c29;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            #graph {
                height: 350px;
                min-height: 300px;
            }

            .metric-card .value {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 576px) {
            .header h1 {
                font-size: 1.3rem;
            }

            .mobile-badge {
                display: block;
                margin: 0.5rem 0 0 0;
            }

            .chart-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Animación de entrada */
        .fade-in {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.2s;
        }

        .delay-3 {
            animation-delay: 0.3s;
        }

        .delay-4 {
            animation-delay: 0.4s;
        }

        .delay-5 {
            animation-delay: 0.5s;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header fade-in">
            <div>
                <h1>
                    <i class="bi bi-phone me-2"></i>Dashboard Agentes MÓVIL
                    <span class="mobile-badge"><i class="bi bi-broadcast"></i> MÓVIL</span>
                </h1>
                <a href="/" class="btn-nav mt-2">
                    <i class="bi bi-arrow-left"></i> Ir a RETENCIÓN
                </a>
            </div>
            <img src="/static/img/cyberpulse_logo.png" alt="CyberPulse" class="logo-img">
        </div>

        <!-- Métricas en Grid - Compactas -->
        <div class="row g-2 mb-2">
            <!-- Fila 1: Métricas principales -->
            <div class="col-6 col-md-4 col-lg-2 fade-in delay-1">
                <div class="metric-card">
                    <div class="icon purple"><i class="bi bi-clock-history"></i></div>
                    <div class="value" id="retro_count">0</div>
                    <div class="label">En Auxiliar</div>
                    <span class="percentage warning" id="porcentaje_auxiliar_badge">0%</span>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2 fade-in delay-2">
                <div class="metric-card">
                    <div class="icon red"><i class="bi bi-exclamation-triangle"></i></div>
                    <div class="value" id="alerta_count">0</div>
                    <div class="label">+30 Min Llamada</div>
                    <span class="percentage warning" id="porcentaje_mas_30_badge">0%</span>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2 fade-in delay-3">
                <div class="metric-card">
                    <div class="icon green"><i class="bi bi-telephone-inbound"></i></div>
                    <div class="value" id="agentes_espera">0</div>
                    <div class="label">Espera Llamada</div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2 fade-in delay-4">
                <div class="metric-card">
                    <div class="icon cyan"><i class="bi bi-people"></i></div>
                    <div class="value" id="total_agentes">0</div>
                    <div class="label">Total Conectados</div>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2 fade-in delay-5">
                <div class="metric-card">
                    <div class="icon orange"><i class="bi bi-hourglass-split"></i></div>
                    <div class="value" id="llamadas_en_espera">0</div>
                    <div class="label">En Cola</div>
                    <span class="alert-badge danger" id="alerta_espera_badge" style="display:none;">
                        <i class="bi bi-bell-fill"></i> Atención
                    </span>
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2 fade-in delay-5">
                <div class="metric-card">
                    <div class="icon red"><i class="bi bi-graph-down"></i></div>
                    <div class="value"><span id="porcentaje_abandono">0</span>%</div>
                    <div class="label">% Abandono</div>
                    <span class="alert-badge danger" id="alerta_abandono_badge" style="display:none;">
                        <i class="bi bi-bell-fill"></i> Alto
                    </span>
                </div>
            </div>
        </div>

        <!-- Fila 2: Contadores secundarios -->
        <div class="row g-2 mb-2">
            <div class="col-4 col-md-4 fade-in delay-3">
                <div class="metric-card text-center">
                    <div class="icon green mx-auto"><i class="bi bi-telephone-plus"></i></div>
                    <div class="value" id="contestadas_total">0</div>
                    <div class="label">Contestadas</div>
                </div>
            </div>
            <div class="col-4 col-md-4 fade-in delay-4">
                <div class="metric-card text-center">
                    <div class="icon red mx-auto"><i class="bi bi-telephone-x"></i></div>
                    <div class="value" id="abandonadas_total">0</div>
                    <div class="label">Abandonadas</div>
                </div>
            </div>
            <div class="col-4 col-md-4 fade-in delay-5">
                <div class="metric-card text-center">
                    <div class="icon cyan mx-auto"><i class="bi bi-telephone"></i></div>
                    <div class="value" id="llamadas_ingresadas">0</div>
                    <div class="label">Ingresadas</div>
                </div>
            </div>
        </div>

        <!-- Gráfica Principal - Máxima prioridad -->
        <div class="chart-container fade-in delay-5">
            <div class="chart-header">
                <h2 class="chart-title"><i class="bi bi-bar-chart-fill me-2"></i>Media de EActual por Agente (MÓVIL)
                </h2>
                <div class="filter-buttons">
                    <button id="btn-morado" class="btn-filter purple-btn" onclick="filtrarGrafica('morado')">
                        <i class="bi bi-circle-fill"></i> Auxiliar
                    </button>
                    <button id="btn-rojo" class="btn-filter red-btn" onclick="filtrarGrafica('rojo')">
                        <i class="bi bi-circle-fill"></i> +30 min
                    </button>
                    <button id="btn-verde" class="btn-filter green-btn" onclick="filtrarGrafica('verde')">
                        <i class="bi bi-circle-fill"></i> Espera
                    </button>
                    <button id="btn-azul" class="btn-filter blue-btn" onclick="filtrarGrafica('azul')">
                        <i class="bi bi-circle-fill"></i> Normal
                    </button>
                    <button id="btn-todos" class="btn-filter all-btn active" onclick="filtrarGrafica('todos')">
                        <i class="bi bi-grid-3x3-gap"></i> Todos
                    </button>
                </div>
            </div>
            <div id="graph"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let datosGlobales = null;
        let filtroActivo = 'todos';

        async function actualizarDashboard() {
            try {
                const response = await fetch('/data2');
                const data = await response.json();
                datosGlobales = data;
                actualizarMetricas(data);
                renderizarGrafica(data, filtroActivo);
            } catch (error) {
                console.error('Error actualizando dashboard:', error);
            }
        }

        function actualizarMetricas(data) {
            document.getElementById('retro_count').textContent = data.retro_count;
            document.getElementById('porcentaje_auxiliar_badge').textContent = data.porcentaje_auxiliar + '%';
            document.getElementById('alerta_count').textContent = data.alerta_count;
            document.getElementById('porcentaje_mas_30_badge').textContent = data.porcentaje_mas_30 + '%';
            document.getElementById('total_agentes').textContent = data.total_agentes;
            document.getElementById('llamadas_en_espera').textContent = data.llamadas_en_espera;
            document.getElementById('porcentaje_abandono').textContent = data.porcentaje_abandono.toFixed(1);
            document.getElementById('agentes_espera').textContent = data.agentes_espera;
            document.getElementById('contestadas_total').textContent = data.contestadas_total;
            document.getElementById('abandonadas_total').textContent = data.abandonadas_total;
            document.getElementById('llamadas_ingresadas').textContent = data.llamadas_ingresadas;

            // Alertas visuales
            document.getElementById('alerta_espera_badge').style.display = data.alerta_espera ? 'inline-flex' : 'none';
            document.getElementById('alerta_abandono_badge').style.display = data.alerta_abandono ? 'inline-flex' : 'none';
        }

        function renderizarGrafica(data, filtro) {
            let nombres = [];
            let valores = [];
            let colores = [];

            data.nombres.forEach((nombre, i) => {
                const color = data.colores[i];
                if (filtro === 'morado' && color !== 'purple') return;
                if (filtro === 'rojo' && color !== 'red') return;
                if (filtro === 'verde' && color !== 'green') return;
                if (filtro === 'azul' && color !== 'blue') return;

                nombres.push(nombre);
                valores.push(data.valores[i]);
                colores.push(color);
            });

            const trace = {
                x: nombres,
                y: valores,
                type: 'bar',
                marker: {
                    color: colores,
                    line: {
                        color: 'rgba(0, 217, 255, 0.3)',
                        width: 1
                    }
                },
                text: valores.map(v => v + ' min'),
                textposition: 'outside',
                textfont: { color: 'white', size: 11 },
                hovertemplate: '<b>%{x}</b><br>Tiempo: %{y:.1f} min<extra></extra>'
            };

            const layout = {
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent',
                font: { color: 'white' },
                xaxis: {
                    title: { text: 'Agentes', font: { size: 14, color: 'rgba(255,255,255,0.7)' } },
                    type: 'category',
                    automargin: true,
                    tickangle: -45,
                    tickfont: { size: 11 },
                    gridcolor: 'rgba(0, 217, 255, 0.1)'
                },
                yaxis: {
                    title: { text: 'Media EActual (minutos)', font: { size: 14, color: 'rgba(255,255,255,0.7)' } },
                    range: [0, Math.max(...valores, data.media_total) * 1.3],
                    dtick: 5,
                    gridcolor: 'rgba(0, 217, 255, 0.1)',
                    zerolinecolor: 'rgba(0, 217, 255, 0.2)'
                },
                margin: { l: 70, r: 30, t: 30, b: 120 },
                shapes: [{
                    type: 'line',
                    x0: -0.5,
                    x1: nombres.length - 0.5,
                    y0: data.media_total,
                    y1: data.media_total,
                    line: { dash: 'dash', color: '#00d9ff', width: 3 }
                }],
                annotations: [{
                    x: 0,
                    y: data.media_total,
                    xref: 'x',
                    yref: 'y',
                    text: '📊 Media: ' + data.media_total + ' min',
                    showarrow: false,
                    font: { color: '#00d9ff', size: 13, family: 'Segoe UI' },
                    xanchor: 'left',
                    yanchor: 'bottom',
                    bgcolor: 'rgba(0,0,0,0.5)',
                    borderpad: 4,
                    borderradius: 4
                }],
                hoverlabel: {
                    bgcolor: 'rgba(0,0,0,0.8)',
                    bordercolor: '#00d9ff',
                    font: { color: 'white', size: 13 }
                }
            };

            const config = {
                responsive: true,
                displayModeBar: false
            };

            Plotly.react('graph', [trace], layout, config);
        }

        function filtrarGrafica(filtro) {
            filtroActivo = filtro;
            if (datosGlobales) renderizarGrafica(datosGlobales, filtroActivo);

            // Actualizar estado de botones
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            const btnMap = {
                'morado': 'btn-morado',
                'rojo': 'btn-rojo',
                'verde': 'btn-verde',
                'azul': 'btn-azul',
                'todos': 'btn-todos'
            };
            document.getElementById(btnMap[filtro]).classList.add('active');
        }

        // Inicializar
        actualizarDashboard();
        setInterval(actualizarDashboard, 10000);

        // Ajustar gráfica al redimensionar ventana
        window.addEventListener('resize', () => {
            if (datosGlobales) renderizarGrafica(datosGlobales, filtroActivo);
        });
    </script>
</body>

</html>
